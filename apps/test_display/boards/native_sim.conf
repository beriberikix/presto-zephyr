# Run the display test on the host via Zephyr's SDL display emulator.
# The native_sim board already provides an "sdl_dc" node selected as
# chosen zephyr,display, so the app draws into an SDL window.
#
# The ST7701 hardware driver is devicetree-gated (no panel node on
# native_sim), so it is simply not built here.

CONFIG_DISPLAY=y
CONFIG_SDL_DISPLAY=y
