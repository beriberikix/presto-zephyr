# ST7701 display bring-up test.
#
# The console stays on UART0: only GP1 (UART RX) doubles as a display data
# lane and is taken over by the driver at runtime; UART TX on GP0 is free, so
# console output still works while the panel is driven.

CONFIG_GPIO=y
CONFIG_DISPLAY=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# 480x480 RGB565 framebuffer (~450 KB) lives in SRAM.
CONFIG_MAIN_STACK_SIZE=4096
